name: All-in-One Bot Controller

on:
  workflow_dispatch:
    inputs:
      bot_to_run:
        description: 'เลือกบอตที่ต้องการรัน (Select bot to run)'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'somtam'
          - 'review'
          - 'lotto'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests openpyxl Pillow beautifulsoup4 numpy

      - name: Run selected script
        env:
          SOMTAM_PAGE_ACCESS_TOKEN: ${{ secrets.SOMTAM_PAGE_ACCESS_TOKEN }}
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:           ${{ secrets.PEXELS_API_KEY }}
        run: |
          CHOICE="${{ github.event.inputs.bot_to_run }}"
          echo "Selected choice: $CHOICE"
          
          if [ "$CHOICE" = "all" ]; then
            echo "Running all posts sequentially with a 2-minute delay in between..."
            
            echo "1. Running somtam.py..."
            python somtam.py
            sleep 120
            
            echo "2. Running review.py..."
            python review.py
            
          elif [ "$CHOICE" = "somtam" ]; then
            python somtam.py
          elif [ "$CHOICE" = "review" ]; then
            python review.py
          elif [ "$CHOICE" = "lotto" ]; then
            python lotto_poster.py
          fi

      - name: Commit and push if Excel updated
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add review_products.xlsx
          if ! git diff --cached --quiet; then
            echo "Staging and pushing review_products.xlsx changes..."
            git commit -m "chore: update review_products.xlsx posted status [skip ci]"
                        # Stash other changes so pull-rebase succeeds
            HAS_CHANGES=$(git status --porcelain | grep -v "review_products.xlsx" || true)
            if [ -n "$HAS_CHANGES" ]; then
              echo "Stashing unstaged changes before pull..."
              git stash --include-untracked
              git pull --rebase
              echo "Restoring stashed changes..."
              git stash pop || true
            else
              git pull --rebase
            fi
            git push
          else
            echo "No changes in review_products.xlsx"
          fi

      - name: Commit and push if history files updated
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          python merge_history.py
