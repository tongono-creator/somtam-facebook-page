name: Product Review Post (CatDumb Style)

on:
  schedule:
    # จันทร์ / พุธ / ศุกร์ เวลา 08:00 Bangkok (01:00 UTC)
    - cron: '0 1 * * 1,3,5'
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests openpyxl Pillow

      - name: Run review script
        env:
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          SOMTAM_PAGE_ACCESS_TOKEN: ${{ secrets.SOMTAM_PAGE_ACCESS_TOKEN }}
          PAGE_ID:                  ${{ secrets.PAGE_ID }}
        run: python review.py

      - name: Commit and push if Excel updated
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add review_products.xlsx
          if git diff --cached --quiet; then
            echo "No changes in review_products.xlsx"
          else
            git commit -m "Update review_products.xlsx posted status [skip ci]"
            git pull --rebase
            git push
          fi
