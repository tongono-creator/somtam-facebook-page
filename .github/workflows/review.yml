name: Product Review Post (CatDumb Style)

on:
  push:
    branches:
      - main
  schedule:
    # อังคาร, พฤหัสบดี, เสาร์ 04:45 BKK (ลดความถี่เป็น พุธ, เสาร์ 18:30 BKK)
    - cron: '20 11 * * *'
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests openpyxl Pillow numpy

      - name: Run review script
        env:
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          SOMTAM_PAGE_ACCESS_TOKEN: ${{ secrets.SOMTAM_PAGE_ACCESS_TOKEN }}
          PAGE_ID:                  ${{ secrets.PAGE_ID }}
          IMMEDIATE:                ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python review.py

      - name: Commit and push if Excel updated
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add review_products.xlsx
          if git diff --cached --quiet; then
            echo "No changes in review_products.xlsx"
          else
            git commit -m "Update review_products.xlsx posted status [skip ci]"
                        # Stash other changes so pull-rebase succeeds
            HAS_CHANGES=$(git status --porcelain | grep -v "review_products.xlsx" || true)
            if [ -n "$HAS_CHANGES" ]; then
              echo "Stashing unstaged changes before pull..."
              git stash --include-untracked
              git pull --rebase
              echo "Restoring stashed changes..."
              git stash pop || true
            else
              git pull --rebase
            fi
            git push
          fi
