name: Post News to Facebook (Content Card)

on:
  schedule:
    # โพสต์ข่าวสัปดาห์ละ 2 ครั้ง (อังคาร และ ศุกร์ เวลา 12:35 น. ตามเวลาไทย)
    - cron: '35 5 * * 2,5'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests Pillow feedparser beautifulsoup4

      - name: Run news script
        env:
          GOOGLE_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          PAGE_ACCESS_TOKEN: ${{ secrets.SOMTAM_PAGE_ACCESS_TOKEN }}
          PAGE_ID:           ${{ secrets.PAGE_ID }}
        run: python news.py
