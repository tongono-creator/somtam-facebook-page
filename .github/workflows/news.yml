name: Post News to Facebook (Content Card)

on:
  push:
    branches:
      - main
  schedule:
    - cron: '30 5 * * 1,4'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests Pillow feedparser beautifulsoup4

      - name: Run news script
        env:
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          PAGE_ID:           ${{ secrets.PAGE_ID }}
        run: python news.py
