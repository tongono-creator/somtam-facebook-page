name: Post News to Facebook (Content Card)

on:
  schedule:
    # โพสต์ข่าวสัปดาห์ละ 2 ครั้ง (จันทร์ และ พฤหัสบดี เวลา 12:30 น. ตามเวลาไทย)
    - cron: '30 5 * * 1,4'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news script
        env:
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          PAGE_ID:           ${{ secrets.PAGE_ID }}
        run: python news.py
