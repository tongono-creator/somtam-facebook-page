name: Somtam Bot

on:
  schedule:
    - cron: "0 1 * * *"   # 08:00 น. ไทย
    - cron: "0 3 * * *"   # 10:00 น. ไทย
    - cron: "0 5 * * *"   # 12:00 น. ไทย
    - cron: "0 7 * * *"   # 14:00 น. ไทย
    - cron: "0 9 * * *"   # 16:00 น. ไทย
    - cron: "0 11 * * *"  # 18:00 น. ไทย
    - cron: "0 12 * * *"  # 19:00 น. ไทย
    - cron: "0 13 * * *"  # 20:00 น. ไทย
    - cron: "0 14 * * *"  # 21:00 น. ไทย
    - cron: "0 15 * * *"  # 22:00 น. ไทย
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-genai requests openpyxl

      - name: Run bot
        env:
          SOMTAM_PAGE_ACCESS_TOKEN: ${{ secrets.SOMTAM_PAGE_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python somtam.py
