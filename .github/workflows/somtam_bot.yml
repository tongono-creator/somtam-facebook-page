name: Somtam Bot

on:
  schedule:
    - cron: "0 4 * * *"   # 11:00 น. ไทย
    - cron: "0 10 * * *"  # 17:00 น. ไทย
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-genai requests openpyxl

      - name: Run bot
        env:
          SOMTAM_PAGE_ACCESS_TOKEN: ${{ secrets.SOMTAM_PAGE_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python somtam.py
