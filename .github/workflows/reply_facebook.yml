name: Facebook AI Auto-Reply

on:
  schedule:
    # รันตรวจสอบคอมเมนต์ทุกๆ 2 ชั่วโมง (นาทีที่ 30 เพื่อไม่ให้ชนรอบ Threads)
    - cron: '30 */2 * * *'
  workflow_dispatch:

jobs:
  reply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests

      - name: Run Facebook Reply Script
        env:
          GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
          PAGE_ACCESS_TOKEN:          ${{ secrets.PAGE_ACCESS_TOKEN }}
          CHOWCHOW_PAGE_ACCESS_TOKEN: ${{ secrets.CHOWCHOW_PAGE_ACCESS_TOKEN }}
          KRAM_PAGE_ACCESS_TOKEN:     ${{ secrets.KRAM_PAGE_ACCESS_TOKEN }}
          SOMTAM_PAGE_ACCESS_TOKEN:   ${{ secrets.SOMTAM_PAGE_ACCESS_TOKEN }}
        run: python reply_facebook.py

      - name: Commit and push if history updated
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          python merge_history.py
